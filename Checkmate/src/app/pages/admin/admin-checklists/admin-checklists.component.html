<div class="page-container">
  <h2>Checklist Builder</h2>

  <div class="card">
    <h3>Create Checklist</h3>

    <div class="form-group">
      <label>Checklist Name</label>
      <input
        type="text"
        placeholder="Enter checklist name"
        [(ngModel)]="checklistName"
      />
    </div>

    <div class="form-group">
      <label>Department</label>
      <input
        type="text"
        placeholder="Enter department"
        [(ngModel)]="department"
      />
    </div>

    <div class="form-group">
      <h4>Tasks</h4>

      <div *ngFor="let task of tasks; let i = index" class="task-row">
        <input
          type="text"
          placeholder="Enter task"
          [(ngModel)]="tasks[i]"
        />
        <button class="remove-btn" (click)="removeTask(i)">Remove</button>
      </div>

      <button class="add-btn" (click)="addTask()">+ Add Task</button>
    </div>

    <button class="create-btn" (click)="createChecklist()">
      Create Checklist
    </button>
  </div>
</div>
