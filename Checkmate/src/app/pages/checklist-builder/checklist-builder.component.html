<div class="page">

  <h1>Create Checklist</h1>

  <div class="card">

    <div class="form-group">
      <label>Checklist Name</label>
      <input type="text"
             [(ngModel)]="checklist.name"
             placeholder="Enter checklist name" />
    </div>

    <div class="form-group">
      <label>Department</label>
      <input type="text"
             [(ngModel)]="checklist.department"
             placeholder="Enter department" />
    </div>

    <div class="form-group">
      <label>Template</label>
      <select [(ngModel)]="checklist.template">
        <option value="">Select Template</option>
        <option *ngFor="let t of templates" [value]="t">{{t}}</option>
      </select>
    </div>

    <div class="form-group">
      <label>Section</label>
      <input type="text"
             [(ngModel)]="checklist.section"
             placeholder="Enter section name (e.g. HR Tasks)" />
    </div>

    <h3>Tasks</h3>

    <div *ngFor="let task of checklist.tasks; let i = index" class="task-box">

      <input type="text"
             [(ngModel)]="task.title"
             placeholder="Task Title" />

      <input type="text"
             [(ngModel)]="task.description"
             placeholder="Task Description" />

      <label>Priority</label>
      <select [(ngModel)]="task.priority">
        <option value="Low">Low</option>
        <option value="Medium">Medium</option>
        <option value="High">High</option>
      </select>

      <label>Deadline</label>
      <input type="date"
             [(ngModel)]="task.deadline" />

      <label>Dependency</label>
      <select [(ngModel)]="task.dependency">
        <option [ngValue]="null">None</option>
        <option *ngFor="let t of checklist.tasks"
                [ngValue]="t.id"
                [disabled]="t.id === task.id">
          {{t.title || ('Task ' + t.id)}}
        </option>
      </select>

      <label>
        <input type="checkbox"
               [(ngModel)]="task.conditional" />
        Conditional Item
      </label>

      <label>Workflow Type</label>
      <select [(ngModel)]="task.workflowType">
        <option value="Sequential">Sequential</option>
        <option value="Parallel">Parallel</option>
      </select>

      <button (click)="removeTask(i)" class="delete-btn">
        Remove
      </button>

    </div>

    <button (click)="addTask()" class="add-btn">
      + Add Task
    </button>

    <br /><br />

    <button (click)="saveChecklist()" class="save-btn">
      Create Checklist
    </button>

  </div>
</div>
