<div class="drawer" [class.open]="isOpen">
  <div class="drawer-header">
    <h2>Add Role</h2>
    <button class="close-btn" (click)="close.emit()">×</button>
  </div>

  <div class="drawer-content">
    <div class="form-group">
      <label for="roleName">Role Name <span class="required">(required)</span></label>
      <input type="text" id="roleName" [(ngModel)]="newRoleName" placeholder="Enter role name">
    </div>

    <div class="form-group">
      <label for="roleDescription">Description <span class="optional">(optional)</span></label>
      <textarea id="roleDescription" [(ngModel)]="newRoleDescription" placeholder="Add your description"></textarea>
    </div>

    <div class="form-group">
      <label for="cloneFrom">Clone From</label>
      <select #cloneSelect id="cloneFrom" (change)="onCloneRoleSelect(cloneSelect.value)">
        <option value="">Clone From...</option>
        <option *ngFor="let role of existingRoles" [value]="role.id">{{ role.name }}</option>
      </select>
    </div>

    <div class="permissions-section">
      <div class="permission-group" *ngFor="let category of permissionCategories">
        <h3>{{ category }}</h3>
        <div class="permission-item" *ngFor="let permission of groupedPermissions[category]">
          <span>{{ permission.name }}</span>
          <label class="switch">
            <input type="checkbox" [(ngModel)]="permission.isEnabled">
            <span class="slider round"></span>
          </label>
        </div>
      </div>
    </div>
  </div>

  <div class="drawer-footer">
    <button class="btn btn-outline-secondary" (click)="close.emit()">Cancel</button>
    <button class="btn btn-primary" (click)="onCreateRole()">Create Role</button>
  </div>
</div>
